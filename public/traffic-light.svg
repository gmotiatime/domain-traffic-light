<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; transform: scale(0.98); }
      50% { opacity: 0.7; transform: scale(1.02); }
    }
    @keyframes seqRed {
      0%, 25% { opacity: 0.9; filter: drop-shadow(0 0 15px #ef4444); }
      30%, 100% { opacity: 0.2; filter: none; }
    }
    @keyframes seqYellow {
      0%, 25% { opacity: 0.2; filter: none; }
      30%, 55% { opacity: 0.9; filter: drop-shadow(0 0 15px #eab308); }
      60%, 100% { opacity: 0.2; filter: none; }
    }
    @keyframes seqGreen {
      0%, 55% { opacity: 0.2; filter: none; }
      60%, 95% { opacity: 0.9; filter: drop-shadow(0 0 15px #10b981); }
      100% { opacity: 0.2; filter: none; }
    }
    .bg-glow { 
      transform-origin: center; 
      animation: pulseGlow 4s ease-in-out infinite; 
    }
    .light-red { animation: seqRed 9s ease-in-out infinite; }
    .light-yellow { animation: seqYellow 9s ease-in-out infinite; }
    .light-green { animation: seqGreen 9s ease-in-out infinite; }
  </style>
  
  
  
  <defs>
    <radialGradient id="trafficGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#58bfff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58bfff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="yellowGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="120" fill="url(#trafficGlow)" class="bg-glow"/>
  
  <g transform="translate(200, 150)">
    <!-- Traffic light body -->
    <rect x="-45" y="-120" width="90" height="240" rx="15" fill="#1e293b" stroke="#58bfff" stroke-width="2.5"/>
    <rect x="-40" y="-115" width="80" height="230" rx="12" fill="#0f172a" opacity="0.5"/>
    
    <!-- Red light -->
    <circle cx="0" cy="-70" r="28" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <circle cx="0" cy="-70" r="28" fill="url(#redGlow)" class="light-red"/>
    <circle cx="0" cy="-70" r="22" fill="#ef4444" opacity="0.8" class="light-red"/>
    <circle cx="-8" cy="-78" r="6" fill="#fca5a5" opacity="0.6"/>
    
    <!-- Yellow light -->
    <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="url(#yellowGlow)" class="light-yellow"/>
    <circle cx="0" cy="0" r="22" fill="#eab308" opacity="0.8" class="light-yellow"/>
    <circle cx="-8" cy="-8" r="6" fill="#fde047" opacity="0.6"/>
    
    <!-- Green light -->
    <circle cx="0" cy="70" r="28" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <circle cx="0" cy="70" r="28" fill="url(#greenGlow)" class="light-green"/>
    <circle cx="0" cy="70" r="22" fill="#10b981" opacity="0.8" class="light-green"/>
    <circle cx="-8" cy="62" r="6" fill="#6ee7b7" opacity="0.6"/>
    
    <!-- Pole -->
    <rect x="-8" y="120" width="16" height="40" rx="2" fill="#1e293b" stroke="#58bfff" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <circle cx="200" cy="150" r="140" fill="none" stroke="#58bfff" stroke-width="1" opacity="0.2" class="bg-glow"/>
  <circle cx="200" cy="150" r="160" fill="none" stroke="#58bfff" stroke-width="1" opacity="0.15" class="bg-glow"/>
  
  <g opacity="0.4" stroke="#58bfff" stroke-width="2">
    <path d="M60,60 L60,90 M60,60 L90,60"/>
    <path d="M340,60 L340,90 M340,60 L310,60"/>
    <path d="M60,240 L60,210 M60,240 L90,240"/>
    <path d="M340,240 L340,210 M340,240 L310,240"/>
  </g>
</svg>
