<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes scanline {
      0% { transform: translateY(-100px); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(100px); opacity: 0; }
    }
    @keyframes dataFlow {
      to { stroke-dashoffset: -200; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes floatSoft {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .flow-path {
      stroke-dasharray: 10 20;
      animation: dataFlow 2s linear infinite;
    }
    .flow-path-fast {
      stroke-dasharray: 5 15;
      animation: dataFlow 1s linear infinite reverse;
    }
    .node-blink {
      animation: blink 2s ease-in-out infinite;
    }
    .floating-core {
      animation: floatSoft 4s ease-in-out infinite;
    }
  </style>

  <defs>
    <!-- Core Glow Gradient -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Outer Rim Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="200" cy="150" r="140" fill="url(#cyanGlow)" />

  <!-- Data Flow Lines (Background) -->
  <path d="M 50 150 Q 120 80 200 150 T 350 150" stroke="#0891b2" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <path d="M 50 150 Q 120 220 200 150 T 350 150" stroke="#0891b2" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  
  <path d="M 50 150 Q 120 80 200 150 T 350 150" stroke="#22d3ee" stroke-width="2" fill="none" class="flow-path" filter="url(#neonCyan)"/>
  <path d="M 50 150 Q 120 220 200 150 T 350 150" stroke="#22d3ee" stroke-width="2" fill="none" class="flow-path-fast" filter="url(#neonCyan)"/>

  <!-- Orbital Data Rings -->
  <circle cx="200" cy="150" r="110" stroke="#0891b2" stroke-width="1" fill="none" stroke-opacity="0.4"/>
  <ellipse cx="200" cy="150" rx="110" ry="30" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-opacity="0.5" stroke-dasharray="4 8" transform="rotate(30 200 150)" />
  <ellipse cx="200" cy="150" rx="110" ry="30" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-opacity="0.5" stroke-dasharray="2 6" transform="rotate(-30 200 150)" />

  <g class="floating-core">
    <!-- Network Nodes -->
    <circle cx="130" cy="150" r="6" fill="#22d3ee" class="node-blink" filter="url(#neonCyan)"/>
    <circle cx="270" cy="150" r="6" fill="#22d3ee" class="node-blink" filter="url(#neonCyan)" style="animation-delay: 1s"/>
    <circle cx="200" cy="80" r="4" fill="#22d3ee" class="node-blink" filter="url(#neonCyan)" style="animation-delay: 0.5s"/>
    <circle cx="200" cy="220" r="4" fill="#22d3ee" class="node-blink" filter="url(#neonCyan)" style="animation-delay: 1.5s"/>

    <!-- Central Core Hexagon -->
    <polygon points="200,105 239,127 239,173 200,195 161,173 161,127" fill="url(#glassGradient)" stroke="url(#cyanGrad)" stroke-width="2" filter="url(#neonCyan)"/>
    <polygon points="200,118 228,134 228,166 200,182 172,166 172,134" fill="#00141a" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.8"/>

    <!-- Inner Processing Core -->
    <circle cx="200" cy="150" r="12" fill="#22d3ee" filter="url(#neonCyan)" class="node-blink"/>
  </g>

  <!-- Scanning Line -->
  <line x1="120" y1="150" x2="280" y2="150" stroke="#ffffff" stroke-width="2" filter="url(#neonCyan)" stroke-opacity="0.8" style="animation: scanline 3s ease-in-out infinite; transform-origin: center;"/>

</svg>
