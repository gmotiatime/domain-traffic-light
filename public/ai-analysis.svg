<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes nodePulse {
      0%, 100% { r: 3; opacity: 0.6; }
      50% { r: 4; opacity: 1; }
    }
    @keyframes flowLeft {
      0% { transform: translateX(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(70px); opacity: 0; }
    }
    @keyframes flowRight {
      0% { transform: translateX(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(-70px); opacity: 0; }
    }
    @keyframes dash {
      to { stroke-dashoffset: -20; }
    }
    .glow1 { animation: pulse 3s ease-in-out infinite; }
    .glow2 { animation: pulse 3s ease-in-out infinite 0.5s; }
    .node { animation: nodePulse 2s ease-in-out infinite; }
    .flow-left { animation: flowLeft 2s ease-in-out infinite; }
    .flow-right { animation: flowRight 2s ease-in-out infinite; }
    .dash-line { 
      stroke-dasharray: 5,5; 
      animation: dash 1s linear infinite;
    }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="100" cy="150" r="80" fill="url(#glow1)" class="glow1"/>
  <circle cx="300" cy="150" r="80" fill="url(#glow2)" class="glow2"/>
  
  <g transform="translate(200, 150)">
    <path d="M-40,-30 Q-50,-40 -40,-50 Q-30,-55 -20,-50 Q-10,-55 0,-50 Q10,-55 20,-50 Q30,-55 40,-50 Q50,-40 40,-30 L40,20 Q45,35 35,40 Q25,42 20,35 Q10,42 0,40 Q-10,42 -20,35 Q-25,42 -35,40 Q-45,35 -40,20 Z" 
          fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    
    <line x1="-25" y1="-20" x2="-15" y2="0" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-25" x2="0" y2="5" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="25" y1="-20" x2="15" y2="0" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="-20" y1="10" x2="0" y2="20" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="10" x2="0" y2="20" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    
    <circle cx="-25" cy="-20" r="3" fill="#a78bfa" class="node" style="animation-delay: 0s"/>
    <circle cx="0" cy="-25" r="3" fill="#a78bfa" class="node" style="animation-delay: 0.2s"/>
    <circle cx="25" cy="-20" r="3" fill="#a78bfa" class="node" style="animation-delay: 0.4s"/>
    <circle cx="-20" cy="10" r="3" fill="#a78bfa" class="node" style="animation-delay: 0.6s"/>
    <circle cx="20" cy="10" r="3" fill="#a78bfa" class="node" style="animation-delay: 0.8s"/>
    <circle cx="0" cy="20" r="4" fill="#8b5cf6" class="node" style="animation-delay: 1s"/>
  </g>
  
  <g opacity="0.5">
    <rect x="30" y="80" width="60" height="4" rx="2" fill="#3b82f6" class="flow-left" style="animation-delay: 0s"/>
    <rect x="40" y="100" width="50" height="4" rx="2" fill="#3b82f6" class="flow-left" style="animation-delay: 0.3s"/>
    <rect x="35" y="120" width="55" height="4" rx="2" fill="#3b82f6" class="flow-left" style="animation-delay: 0.6s"/>
    <rect x="30" y="180" width="60" height="4" rx="2" fill="#3b82f6" class="flow-left" style="animation-delay: 0.9s"/>
    <rect x="40" y="200" width="50" height="4" rx="2" fill="#3b82f6" class="flow-left" style="animation-delay: 1.2s"/>
  </g>
  
  <g opacity="0.5">
    <rect x="310" y="80" width="60" height="4" rx="2" fill="#8b5cf6" class="flow-right" style="animation-delay: 0.2s"/>
    <rect x="310" y="100" width="50" height="4" rx="2" fill="#8b5cf6" class="flow-right" style="animation-delay: 0.5s"/>
    <rect x="310" y="120" width="55" height="4" rx="2" fill="#8b5cf6" class="flow-right" style="animation-delay: 0.8s"/>
    <rect x="310" y="180" width="60" height="4" rx="2" fill="#8b5cf6" class="flow-right" style="animation-delay: 1.1s"/>
    <rect x="310" y="200" width="50" height="4" rx="2" fill="#8b5cf6" class="flow-right" style="animation-delay: 1.4s"/>
  </g>
  
  <g opacity="0.3">
    <line x1="100" y1="50" x2="300" y2="50" stroke="#8b5cf6" stroke-width="1" class="dash-line"/>
    <line x1="100" y1="250" x2="300" y2="250" stroke="#8b5cf6" stroke-width="1" class="dash-line"/>
  </g>
</svg>
