<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes brainPulse {
      0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px #8b5cf6); }
      50% { transform: scale(1.05); filter: brightness(1.3) drop-shadow(0 0 25px #c4b5fd); }
    }
    @keyframes synapseFire {
      0%, 100% { stroke-opacity: 0.2; }
      50% { stroke-opacity: 1; stroke-width: 2; }
    }
    @keyframes nodeFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    .brain { animation: brainPulse 3s ease-in-out infinite; transform-origin: 200px 150px; }
    .syn-1 { animation: synapseFire 2s ease-in-out infinite; }
    .syn-2 { animation: synapseFire 2.5s ease-in-out infinite 0.5s; }
    .syn-3 { animation: synapseFire 1.8s ease-in-out infinite 1s; }
    .node-float { animation: nodeFloat 4s ease-in-out infinite; transform-origin: center; }
  </style>

  <defs>
    <radialGradient id="violetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.8"/>
    </linearGradient>

    <filter id="neonViolet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="140" fill="url(#violetGlow)" />

  <!-- Neural Network Synapses -->
  <g stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3">
    <!-- Left side -->
    <path d="M 200 150 L 130 90 L 80 120" class="syn-1" filter="url(#neonViolet)"/>
    <path d="M 200 150 L 110 160 L 70 200" class="syn-2"/>
    <path d="M 130 90 L 110 160" stroke-dasharray="2 4"/>
    
    <!-- Right side -->
    <path d="M 200 150 L 270 90 L 320 120" class="syn-3" filter="url(#neonViolet)"/>
    <path d="M 200 150 L 290 160 L 330 200" class="syn-1"/>
    <path d="M 270 90 L 290 160" stroke-dasharray="2 4"/>

    <!-- Bottom/Top -->
    <path d="M 200 150 L 200 60" class="syn-2"/>
    <path d="M 200 150 L 160 220 L 240 220 Z" class="syn-3"/>
  </g>

  <!-- Floating Nodes -->
  <g class="node-float">
    <circle cx="130" cy="90" r="5" fill="#f5f3ff" filter="url(#neonViolet)"/>
    <circle cx="80" cy="120" r="3" fill="#c4b5fd"/>
    <circle cx="110" cy="160" r="4" fill="#a78bfa" filter="url(#neonViolet)"/>
    <circle cx="70" cy="200" r="3" fill="#c4b5fd"/>
    
    <circle cx="270" cy="90" r="5" fill="#f5f3ff" filter="url(#neonViolet)"/>
    <circle cx="320" cy="120" r="3" fill="#c4b5fd"/>
    <circle cx="290" cy="160" r="4" fill="#a78bfa" filter="url(#neonViolet)"/>
    <circle cx="330" cy="200" r="3" fill="#c4b5fd"/>
    
    <circle cx="200" cy="60" r="4" fill="#a78bfa" filter="url(#neonViolet)"/>
    <circle cx="160" cy="220" r="4" fill="#c4b5fd"/>
    <circle cx="240" cy="220" r="4" fill="#c4b5fd"/>
  </g>

  <!-- AI Core / Brain -->
  <g class="brain">
    <path d="M200 110 C 230 110, 245 130, 245 150 C 245 170, 220 185, 200 190 C 180 185, 155 170, 155 150 C 155 130, 170 110, 200 110 Z" fill="url(#brainGrad)" opacity="0.8"/>
    <!-- Circuit lines inside brain -->
    <path d="M200 120 L200 170 M 180 140 L 220 140 M 170 160 L 200 180 L 230 160" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
    <circle cx="200" cy="150" r="12" fill="#ffffff" filter="url(#neonViolet)"/>
    <circle cx="200" cy="150" r="4" fill="#6d28d9"/>
  </g>

</svg>
