<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes bookOpen {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(10deg); }
    }
    @keyframes pageFlip {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .book { 
      transform-origin: center;
      animation: bookOpen 3s ease-in-out infinite;
    }
    .page { animation: pageFlip 2s ease-in-out infinite; }
    .star { animation: sparkle 2s ease-in-out infinite; }
  </style>
  
  
  
  <defs>
    <radialGradient id="bookGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#bookGlow)" class="glow"/>
  
  <g transform="translate(200, 150)" class="book">
    <rect x="-50" y="-40" width="100" height="80" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="-45" y="-35" width="90" height="70" rx="3" fill="#0f172a" opacity="0.5"/>
    
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#f59e0b" stroke-width="2"/>
    
    <g class="page" style="animation-delay: 0s">
      <line x1="-35" y1="-20" x2="-10" y2="-20" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <line x1="-35" y1="-10" x2="-5" y2="-10" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
      <line x1="-35" y1="-2" x2="-8" y2="-2" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    </g>
    
    <g class="page" style="animation-delay: 0.3s">
      <line x1="10" y1="-20" x2="35" y2="-20" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <line x1="5" y1="-10" x2="35" y2="-10" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
      <line x1="8" y1="-2" x2="35" y2="-2" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    </g>
    
    <g class="page" style="animation-delay: 0.6s">
      <line x1="-35" y1="10" x2="-10" y2="10" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <line x1="-35" y1="18" x2="-5" y2="18" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
      <line x1="-35" y1="26" x2="-8" y2="26" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    </g>
    
    <g class="page" style="animation-delay: 0.9s">
      <line x1="10" y1="10" x2="35" y2="10" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
      <line x1="5" y1="18" x2="35" y2="18" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
      <line x1="8" y1="26" x2="35" y2="26" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    </g>
  </g>
  
  <circle cx="200" cy="150" r="80" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15" class="glow"/>
  
  <g opacity="0.6">
    <circle cx="140" cy="100" r="3" fill="#fbbf24" class="star" style="animation-delay: 0s"/>
    <circle cx="260" cy="100" r="3" fill="#fbbf24" class="star" style="animation-delay: 0.4s"/>
    <circle cx="140" cy="200" r="3" fill="#fbbf24" class="star" style="animation-delay: 0.8s"/>
    <circle cx="260" cy="200" r="3" fill="#fbbf24" class="star" style="animation-delay: 1.2s"/>
    <circle cx="120" cy="150" r="2" fill="#fbbf24" class="star" style="animation-delay: 0.2s"/>
    <circle cx="280" cy="150" r="2" fill="#fbbf24" class="star" style="animation-delay: 0.6s"/>
  </g>
</svg>
