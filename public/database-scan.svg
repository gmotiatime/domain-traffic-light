<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes scanDown {
      0% { transform: translateY(-70px); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { transform: translateY(70px); opacity: 0; }
    }
    @keyframes serverBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes dataRead {
      to { stroke-dashoffset: -50; }
    }
    .scanner { animation: scanDown 3s ease-in-out infinite; }
    .blink-1 { animation: serverBlink 2s infinite; }
    .blink-2 { animation: serverBlink 3s infinite 1s; }
    .blink-3 { animation: serverBlink 1.5s infinite 0.5s; }
    .read-line { stroke-dasharray: 5 10; animation: dataRead 1s linear infinite; }
  </style>

  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="neonBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="140" fill="url(#blueGlow)" />

  <!-- Data connecting lines -->
  <path d="M120 70 L160 110 M120 230 L160 190 M280 70 L240 110 M280 230 L240 190" stroke="#1d4ed8" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M120 70 L160 110" stroke="#60a5fa" stroke-width="1.5" class="read-line" filter="url(#neonBlue)"/>

  <!-- Server Racks -->
  <!-- Top Rack -->
  <g transform="translate(0, -50)">
    <rect x="140" y="110" width="120" height="30" rx="4" fill="url(#serverGrad)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="145" y="115" width="20" height="6" rx="2" fill="#60a5fa" class="blink-1" filter="url(#neonBlue)"/>
    <rect x="145" y="125" width="40" height="6" rx="2" fill="#1d4ed8" opacity="0.6"/>
    <circle cx="245" cy="125" r="3" fill="#60a5fa" class="blink-2" filter="url(#neonBlue)"/>
  </g>

  <!-- Middle Rack -->
  <g transform="translate(0, 0)">
    <rect x="140" y="110" width="120" height="30" rx="4" fill="url(#serverGrad)" stroke="#60a5fa" stroke-width="2" filter="url(#neonBlue)"/>
    <rect x="145" y="115" width="30" height="6" rx="2" fill="#2563eb" opacity="0.7"/>
    <rect x="145" y="125" width="50" height="6" rx="2" fill="#60a5fa" class="blink-3" filter="url(#neonBlue)"/>
    <circle cx="245" cy="125" r="3" fill="#bfdbfe" class="blink-1" filter="url(#neonBlue)"/>
  </g>

  <!-- Bottom Rack -->
  <g transform="translate(0, 50)">
    <rect x="140" y="110" width="120" height="30" rx="4" fill="url(#serverGrad)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="145" y="115" width="25" height="6" rx="2" fill="#60a5fa" class="blink-2" filter="url(#neonBlue)"/>
    <rect x="145" y="125" width="30" height="6" rx="2" fill="#1d4ed8" opacity="0.6"/>
    <circle cx="245" cy="125" r="3" fill="#60a5fa" class="blink-3" filter="url(#neonBlue)"/>
  </g>

  <g class="scanner">
    <line x1="120" y1="150" x2="280" y2="150" stroke="#93c5fd" stroke-width="3" filter="url(#neonBlue)"/>
    <polygon points="120,150 280,150 260,170 140,170" fill="#3b82f6" fill-opacity="0.1"/>
  </g>

</svg>
