<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes globeSpin {
      from { transform: rotateY(0deg) rotateZ(0deg); }
      to { transform: rotateY(360deg) rotateZ(10deg); }
    }
    @keyframes networkPulse {
      0%, 100% { opacity: 0.5; filter: blur(2px); }
      50% { opacity: 1; filter: blur(0px); }
    }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .spin { animation: globeSpin 20s linear infinite; transform-origin: 200px 150px; perspective: 1000px; }
    .pulse-node { animation: networkPulse 2s ease-in-out infinite; }
    .orb-anim { animation: floatOrb 5s ease-in-out infinite; transform-origin: 200px 150px; }
  </style>

  <defs>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="140" fill="url(#purpleGlow)" />

  <!-- Abstract Network Nodes -->
  <path d="M100 100 L200 150 L300 120 M200 150 L220 250 M140 220 L200 150" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
  
  <circle cx="100" cy="100" r="4" fill="#a855f7" class="pulse-node" filter="url(#neonPurple)"/>
  <circle cx="300" cy="120" r="5" fill="#a855f7" class="pulse-node" filter="url(#neonPurple)" style="animation-delay: 1s"/>
  <circle cx="220" cy="250" r="6" fill="#a855f7" class="pulse-node" filter="url(#neonPurple)" style="animation-delay: 0.5s"/>
  <circle cx="140" cy="220" r="4" fill="#a855f7" class="pulse-node" filter="url(#neonPurple)" style="animation-delay: 1.5s"/>

  <g class="orb-anim">
    <!-- Globe Base -->
    <circle cx="200" cy="150" r="75" fill="url(#glassGradient)" stroke="url(#purpleGrad)" stroke-width="2" filter="url(#neonPurple)"/>
    <circle cx="200" cy="150" r="60" fill="#130026" stroke="#a855f7" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Spinning Meridians -->
    <g class="spin">
      <ellipse cx="200" cy="150" rx="30" ry="60" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-opacity="0.7" filter="url(#neonPurple)"/>
      <ellipse cx="200" cy="150" rx="60" ry="20" fill="none" stroke="#d8b4fe" stroke-width="1.5" stroke-opacity="0.5"/>
      <ellipse cx="200" cy="150" rx="10" ry="60" fill="none" stroke="#d8b4fe" stroke-width="1" stroke-opacity="0.4"/>
      
      <!-- Network Nodes on Globe -->
      <circle cx="170" cy="150" r="5" fill="#ffffff" filter="url(#neonPurple)"/>
      <circle cx="230" cy="150" r="4" fill="#ffffff" filter="url(#neonPurple)"/>
      <circle cx="200" cy="130" r="6" fill="#ffffff" filter="url(#neonPurple)"/>
    </g>
  </g>

</svg>
