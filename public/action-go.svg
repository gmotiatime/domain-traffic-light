<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes rippleExpand {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes successFloat {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-5px) scale(1.02); }
    }
    @keyframes dashAround {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }
    .ripple-1 { animation: rippleExpand 3s ease-out infinite; transform-origin: 200px 150px; }
    .ripple-2 { animation: rippleExpand 3s ease-out infinite 1.5s; transform-origin: 200px 150px; }
    .icon-float { animation: successFloat 4s ease-in-out infinite; }
    .draw-circle { stroke-dasharray: 400; animation: dashAround 8s linear infinite; }
  </style>

  <defs>
    <!-- Core Glow Gradient -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="200" cy="150" r="130" fill="url(#greenGlow)" />

  <!-- Background Ripples -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="#10b981" stroke-width="2" class="ripple-1" filter="url(#neonGreen)"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#34d399" stroke-width="1" class="ripple-2" filter="url(#neonGreen)"/>

  <!-- Background Lines -->
  <line x1="200" y1="20" x2="200" y2="40" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="200" y1="260" x2="200" y2="280" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="20" y1="150" x2="40" y2="150" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="360" y1="150" x2="380" y2="150" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Rotating Border -->
  <circle cx="200" cy="150" r="95" fill="none" stroke="#047857" stroke-width="1" />
  <circle cx="200" cy="150" r="95" fill="none" stroke="#34d399" stroke-width="2" class="draw-circle" filter="url(#neonGreen)"/>

  <g class="icon-float">
    <!-- Glassmorphic Shield/Shield-like circle -->
    <circle cx="200" cy="150" r="70" fill="url(#glassGradient)" stroke="url(#greenGrad)" stroke-width="2" filter="url(#neonGreen)"/>
    
    <circle cx="200" cy="150" r="55" fill="#021c13" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6"/>

    <!-- Perfect Checkmark -->
    <path d="M175 152 L192 169 L228 133" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGreen)"/>
  </g>

</svg>
