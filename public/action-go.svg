<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes checkGrow {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .check { animation: checkGrow 2s ease-in-out infinite; }
    .gear { 
      transform-origin: 200px 150px;
      animation: rotate 8s linear infinite;
    }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="actionGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#actionGlow)" class="glow"/>
  
  <!-- Gear -->
  <g class="gear">
    <circle cx="200" cy="150" r="40" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <circle cx="200" cy="150" r="25" fill="#0f172a"/>
    
    <!-- Gear teeth -->
    <rect x="195" y="100" width="10" height="15" fill="#10b981"/>
    <rect x="195" y="185" width="10" height="15" fill="#10b981"/>
    <rect x="150" y="145" width="15" height="10" fill="#10b981"/>
    <rect x="235" y="145" width="15" height="10" fill="#10b981"/>
    
    <rect x="165" y="115" width="12" height="12" fill="#10b981" transform="rotate(45 171 121)"/>
    <rect x="223" y="115" width="12" height="12" fill="#10b981" transform="rotate(-45 229 121)"/>
    <rect x="165" y="173" width="12" height="12" fill="#10b981" transform="rotate(-45 171 179)"/>
    <rect x="223" y="173" width="12" height="12" fill="#10b981" transform="rotate(45 229 179)"/>
  </g>
  
  <!-- Action arrow -->
  <g transform="translate(280, 150)" class="check">
    <circle cx="0" cy="0" r="30" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
    <path d="M-10,0 L5,0 M5,0 L-2,-8 M5,0 L-2,8" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <circle cx="200" cy="150" r="80" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#10b981" stroke-width="1" opacity="0.15" class="glow"/>
  <circle cx="200" cy="150" r="120" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1" class="glow"/>
  
  <g opacity="0.5">
    <circle cx="120" cy="150" r="5" fill="#10b981" class="glow"/>
    <circle cx="280" cy="150" r="5" fill="#10b981" class="glow"/>
    <circle cx="200" cy="70" r="5" fill="#10b981" class="glow"/>
    <circle cx="200" cy="230" r="5" fill="#10b981" class="glow"/>
  </g>
</svg>
