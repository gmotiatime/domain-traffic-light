<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; filter: drop-shadow(0 0 10px #ef4444); transform: scale(0.95); }
      50% { opacity: 0.9; filter: drop-shadow(0 0 30px #f87171); transform: scale(1.05); }
    }
    @keyframes alertPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; border-color: #ef4444; }
      50% { transform: scale(1.02); opacity: 0.8; border-color: #fca5a5; }
    }
    @keyframes ringExpand {
      0% { r: 70; opacity: 0.5; stroke-width: 2; }
      100% { r: 120; opacity: 0; stroke-width: 0; }
    }
    @keyframes blinkWarning {
      0%, 100% { opacity: 0.3; fill: #ef4444; }
      50% { opacity: 1; fill: #fca5a5; }
    }
    @keyframes shakeSoft {
      0%, 100% { transform: translate(200px, 100px) rotate(0deg); }
      20% { transform: translate(198px, 100px) rotate(-2deg); }
      40% { transform: translate(202px, 100px) rotate(2deg); }
      60% { transform: translate(199px, 100px) rotate(-1deg); }
      80% { transform: translate(201px, 100px) rotate(1deg); }
    }
    .glow { transform-origin: center; animation: pulseGlow 2.5s ease-in-out infinite; }
    .alert { animation: alertPulse 2s ease-in-out infinite; }
    .ring { transform-origin: center; animation: ringExpand 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .indicator { animation: blinkWarning 1.5s ease-in-out infinite; }
    .triangle { animation: shakeSoft 4s ease-in-out infinite; }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="alertGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="120" r="100" fill="url(#alertGlow)" class="glow"/>
  
  <g class="triangle">
    <path d="M0,-50 L50,40 L-50,40 Z" fill="none" stroke="#ef4444" stroke-width="3"/>
    <path d="M0,-35 L35,30 L-35,30 Z" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    
    <line x1="0" y1="-15" x2="0" y2="10" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="20" r="2.5" fill="#ef4444"/>
  </g>
  
  <circle cx="200" cy="100" r="70" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" class="ring" style="animation-delay: 0s"/>
  <circle cx="200" cy="100" r="70" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" class="ring" style="animation-delay: 0.7s"/>
  <circle cx="200" cy="100" r="70" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3" class="ring" style="animation-delay: 1.4s"/>
  
  <g opacity="0.5">
    <rect x="50" y="80" width="60" height="6" rx="3" fill="#ef4444" class="indicator" style="animation-delay: 0s"/>
    <rect x="60" y="95" width="50" height="5" rx="2.5" fill="#ef4444" opacity="0.7" class="indicator" style="animation-delay: 0.2s"/>
    <rect x="55" y="108" width="55" height="5" rx="2.5" fill="#ef4444" opacity="0.7" class="indicator" style="animation-delay: 0.4s"/>
    
    <rect x="290" y="80" width="60" height="6" rx="3" fill="#ef4444" class="indicator" style="animation-delay: 0.6s"/>
    <rect x="290" y="95" width="50" height="5" rx="2.5" fill="#ef4444" opacity="0.7" class="indicator" style="animation-delay: 0.8s"/>
    <rect x="290" y="108" width="55" height="5" rx="2.5" fill="#ef4444" opacity="0.7" class="indicator" style="animation-delay: 1s"/>
  </g>
  
  <g transform="translate(200, 220)">
    <rect x="-120" y="0" width="240" height="50" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" opacity="0.6" class="alert"/>
    
    <circle cx="-80" cy="25" r="12" fill="none" stroke="#ef4444" stroke-width="2" class="indicator" style="animation-delay: 0s"/>
    <line x1="-80" y1="18" x2="-80" y2="28" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-80" cy="32" r="1.5" fill="#ef4444"/>
    
    <circle cx="0" cy="25" r="12" fill="none" stroke="#f59e0b" stroke-width="2" class="indicator" style="animation-delay: 0.3s"/>
    <line x1="0" y1="18" x2="0" y2="28" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="32" r="1.5" fill="#f59e0b"/>
    
    <circle cx="80" cy="25" r="12" fill="none" stroke="#ef4444" stroke-width="2" class="indicator" style="animation-delay: 0.6s"/>
    <path d="M72,25 L76,29 L88,17" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
