<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes shieldPulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }
    @keyframes radarScan {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes blockPulse {
      0%, 100% { fill-opacity: 0.1; }
      50% { fill-opacity: 0.9; }
    }
    .main-shield { animation: shieldPulse 4s ease-in-out infinite; transform-origin: 200px 150px; }
    .radar { animation: radarScan 4s linear infinite; transform-origin: 200px 150px; }
    .block-alert { animation: blockPulse 1s ease-in-out infinite; }
  </style>

  <defs>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#14532d" stop-opacity="0.4"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="130" fill="url(#greenGlow)" />

  <!-- Outer scanning area -->
  <circle cx="200" cy="150" r="100" stroke="#166534" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
  <path d="M 200 50 A 100 100 0 0 1 300 150" stroke="#22c55e" stroke-width="2" fill="none" class="radar" filter="url(#neonGreen)"/>
  <circle cx="200" cy="150" r="80" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 8" fill="none" class="radar" style="animation-direction: reverse; animation-duration: 8s;"/>

  <!-- Sub-nodes mapping threats -->
  <circle cx="120" cy="100" r="4" fill="#ef4444" class="block-alert" filter="url(#neonGreen)"/>
  <line x1="120" y1="100" x2="160" y2="120" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 4" class="block-alert"/>
  
  <circle cx="300" cy="180" r="4" fill="#ef4444" class="block-alert" filter="url(#neonGreen)" style="animation-delay: 0.5s"/>
  <line x1="300" y1="180" x2="250" y2="160" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 4" class="block-alert" style="animation-delay: 0.5s"/>

  <g class="main-shield">
    <!-- Premium glass shield -->
    <path d="M200 60 L260 80 L260 140 C260 190 220 230 200 240 C180 230 140 190 140 140 L140 80 Z" fill="url(#glassGradient)" stroke="url(#shieldGrad)" stroke-width="2" filter="url(#neonGreen)"/>
    <path d="M200 75 L245 92 L245 142 C245 180 215 210 200 220 C185 210 155 180 155 142 L155 92 Z" fill="#022c15" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Inner glowing protection core -->
    <circle cx="200" cy="140" r="18" fill="#4ade80" filter="url(#neonGreen)"/>
    <path d="M192 140 L198 146 L210 134" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
