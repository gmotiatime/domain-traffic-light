<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes speedLine {
      0% { transform: translateX(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(100px); opacity: 0; }
    }
    @keyframes boltGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .speed { animation: speedLine 1.5s ease-out infinite; }
    .bolt { animation: boltGlow 1s ease-in-out infinite; }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="speedGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#speedGlow)" class="glow"/>
  
  <g transform="translate(200, 150)">
    <path d="M-20,-60 L-40,20 L-10,10 L-30,60 L40,-20 L0,0 L20,-60 Z" 
          fill="#eab308" opacity="0.8" class="bolt"/>
    <path d="M-15,-50 L-30,10 L-5,5 L-20,50 L30,-15 L0,-5 L15,-50 Z" 
          fill="#fef08a" opacity="0.6"/>
  </g>
  
  <g opacity="0.5">
    <rect x="50" y="100" width="60" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 0s"/>
    <rect x="50" y="120" width="80" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 0.2s"/>
    <rect x="50" y="140" width="70" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 0.4s"/>
    <rect x="50" y="160" width="90" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 0.6s"/>
    <rect x="50" y="180" width="75" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 0.8s"/>
    <rect x="50" y="200" width="85" height="4" rx="2" fill="#eab308" class="speed" style="animation-delay: 1s"/>
  </g>
  
  <circle cx="200" cy="150" r="80" fill="none" stroke="#eab308" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#eab308" stroke-width="1" opacity="0.15" class="glow"/>
  <circle cx="200" cy="150" r="120" fill="none" stroke="#eab308" stroke-width="1" opacity="0.1" class="glow"/>
  
  <g opacity="0.4">
    <line x1="100" y1="80" x2="140" y2="120" stroke="#eab308" stroke-width="2"/>
    <line x1="300" y1="80" x2="260" y2="120" stroke="#eab308" stroke-width="2"/>
    <line x1="100" y1="220" x2="140" y2="180" stroke="#eab308" stroke-width="2"/>
    <line x1="300" y1="220" x2="260" y2="180" stroke="#eab308" stroke-width="2"/>
  </g>
</svg>
