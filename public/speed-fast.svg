<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes fastPulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes thrustLines {
      0% { stroke-dashoffset: 200; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes streakMove {
      from { transform: translateX(100px); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translateX(-200px); opacity: 0; }
    }
    .core-bolt { animation: fastPulse 2s ease-in-out infinite; transform-origin: 200px 150px; }
    .speed-line {
      stroke-dasharray: 20 40;
      animation: thrustLines 1s linear infinite;
    }
    .streak { animation: streakMove 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
  </style>

  <defs>
    <radialGradient id="yellowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#facc15" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="140" fill="url(#yellowGlow)" />

  <!-- Speed streaks -->
  <line x1="300" y1="100" x2="150" y2="100" stroke="#facc15" stroke-width="2" class="streak" filter="url(#neonYellow)" stroke-linecap="round"/>
  <line x1="320" y1="200" x2="120" y2="200" stroke="#facc15" stroke-width="3" class="streak" filter="url(#neonYellow)" style="animation-delay: 0.4s" stroke-linecap="round"/>
  <line x1="280" y1="150" x2="100" y2="150" stroke="#facc15" stroke-width="1.5" class="streak" filter="url(#neonYellow)" style="animation-delay: 0.8s" stroke-linecap="round"/>

  <!-- Orbital thrust -->
  <ellipse cx="200" cy="150" rx="90" ry="110" stroke="#eab308" stroke-width="1.5" fill="none" stroke-opacity="0.3" transform="rotate(-15 200 150)"/>
  <ellipse cx="200" cy="150" rx="90" ry="110" stroke="#fef08a" stroke-width="2" fill="none" class="speed-line" filter="url(#neonYellow)" transform="rotate(-15 200 150)"/>

  <g class="core-bolt">
    <polygon points="200,80 260,115 260,185 200,220 140,185 140,115" fill="url(#glassGradient)" stroke="url(#yellowGrad)" stroke-width="2" filter="url(#neonYellow)"/>
    <polygon points="200,95 245,122 245,178 200,205 155,178 155,122" fill="#1a1500" stroke="#facc15" stroke-width="1.5" stroke-opacity="0.7"/>

    <!-- Lightning Bolt -->
    <path d="M210 110 L175 160 L200 160 L190 200 L230 145 L205 145 Z" fill="#facc15" filter="url(#neonYellow)" stroke="#fef08a" stroke-width="1"/>
  </g>

</svg>
