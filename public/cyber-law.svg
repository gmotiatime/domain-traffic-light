<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    @keyframes floatBook {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }
    @keyframes scaleGlow {
      0%, 100% { transform: scale(1); opacity: 0.6; filter: drop-shadow(0 0 10px #60a5fa); }
      50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 25px #3b82f6); }
    }
    @keyframes spinDash {
      to { stroke-dashoffset: -40; transform: rotate(360deg); }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.1; transform: scale(0.5) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.5) rotate(45deg); }
    }
    .bg-glow { transform-origin: center; animation: pulse 4s ease-in-out infinite; }
    .book { 
      transform-origin: 200px 120px;
      animation: floatBook 4s ease-in-out infinite;
    }
    .shield { 
      transform-origin: center;
      animation: scaleGlow 3s ease-in-out infinite;
    }
    .orbit { 
      stroke-dasharray: 8,8; 
      transform-origin: 200px 140px;
      animation: spinDash 15s linear infinite;
    }
    .star { transform-origin: center; animation: sparkle 2.5s ease-in-out infinite; }
  </style>
  
  
  
  <defs>
    <radialGradient id="cyberGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#7cc7ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7cc7ff;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <circle cx="200" cy="150" r="120" fill="url(#cyberGlow)" class="bg-glow"/>
  
  <g class="book">
    <!-- Book -->
    <rect x="140" y="80" width="120" height="80" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="145" y="85" width="110" height="70" rx="4" fill="#0f172a" opacity="0.5"/>
    
    <!-- Book spine -->
    <line x1="200" y1="80" x2="200" y2="160" stroke="#3b82f6" stroke-width="2.5"/>
    
    <!-- Book pages -->
    <g opacity="0.6">
      <line x1="160" y1="100" x2="190" y2="100" stroke="#60a5fa" stroke-width="2"/>
      <line x1="160" y1="110" x2="185" y2="110" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="160" y1="118" x2="188" y2="118" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="160" y1="130" x2="190" y2="130" stroke="#60a5fa" stroke-width="2"/>
      <line x1="160" y1="140" x2="185" y2="140" stroke="#60a5fa" stroke-width="1.5"/>
      
      <line x1="210" y1="100" x2="240" y2="100" stroke="#60a5fa" stroke-width="2"/>
      <line x1="215" y1="110" x2="240" y2="110" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="212" y1="118" x2="240" y2="118" stroke="#60a5fa" stroke-width="1.5"/>
      <line x1="210" y1="130" x2="240" y2="130" stroke="#60a5fa" stroke-width="2"/>
      <line x1="215" y1="140" x2="240" y2="140" stroke="#60a5fa" stroke-width="1.5"/>
    </g>
    
    <!-- Shield overlay -->
    <g class="shield">
      <path d="M200,100 L230,115 L230,145 Q230,165 200,180 Q170,165 170,145 L170,115 Z" 
            fill="url(#bookGrad)" stroke="#60a5fa" stroke-width="2"/>
      <path d="M200,110 L220,122 L220,142 Q220,158 200,170 Q180,158 180,142 L180,122 Z" 
            fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Checkmark in shield -->
      <path d="M190,140 L197,148 L215,125" 
            fill="none" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Cyber law text effect -->
  <g transform="translate(200, 220)">
    <text x="0" y="0" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="bold" opacity="0.8">#КиберПраво</text>
    <text x="0" y="0" text-anchor="middle" fill="#60a5fa" font-size="24" font-weight="bold" opacity="0.3" transform="translate(2, 2)">#КиберПраво</text>
  </g>
  
  <!-- Orbiting elements -->
  <circle cx="200" cy="140" r="100" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2" class="orbit"/>
  <circle cx="200" cy="140" r="120" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15" class="orbit"/>
  
  <!-- Corner accents -->
  <g opacity="0.4" stroke="#3b82f6" stroke-width="2">
    <path d="M60,60 L60,90 M60,60 L90,60"/>
    <path d="M340,60 L340,90 M340,60 L310,60"/>
    <path d="M60,240 L60,210 M60,240 L90,240"/>
    <path d="M340,240 L340,210 M340,240 L310,240"/>
  </g>
  
  <!-- Decorative stars -->
  <g opacity="0.6">
    <circle cx="120" cy="120" r="3" fill="#60a5fa" class="star" style="animation-delay: 0s"/>
    <circle cx="280" cy="120" r="3" fill="#60a5fa" class="star" style="animation-delay: 0.4s"/>
    <circle cx="120" cy="180" r="3" fill="#60a5fa" class="star" style="animation-delay: 0.8s"/>
    <circle cx="280" cy="180" r="3" fill="#60a5fa" class="star" style="animation-delay: 1.2s"/>
  </g>
</svg>
