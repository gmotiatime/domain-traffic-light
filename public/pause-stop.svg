<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes rotateSmooth {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    @keyframes radarSweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes dashMove {
      to { stroke-dashoffset: -100; }
    }
    .orbit-slow {
      transform-origin: 200px 150px;
      animation: rotateSmooth 12s linear infinite;
    }
    .orbit-fast {
      transform-origin: 200px 150px;
      animation: rotateSmooth 6s linear infinite reverse;
    }
    .core-pulse {
      transform-origin: 200px 150px;
      animation: pulseSoft 3s ease-in-out infinite;
    }
    .dash-line {
      stroke-dasharray: 6 12;
      animation: dashMove 3s linear infinite;
    }
  </style>

  <defs>
    <!-- Core Glow Gradient -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1f5a" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ff1f5a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff1f5a" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Outer Rim Gradient -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1f5a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8a0026" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Metallic/Glass Center -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Background Glow -->
  <circle cx="200" cy="150" r="120" fill="url(#coreGlow)" />

  <!-- Orbital Rings -->
  <g class="orbit-slow">
    <circle cx="200" cy="150" r="90" stroke="#ff1f5a" stroke-width="1" stroke-opacity="0.3" fill="none" stroke-dasharray="2 6"/>
    <circle cx="200" cy="150" r="110" stroke="#ff1f5a" stroke-width="2" stroke-opacity="0.15" fill="none" stroke-dasharray="20 40 10 30"/>
    <path d="M 200 40 A 110 110 0 0 1 310 150" stroke="#ff1f5a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
  
  <g class="orbit-fast">
    <circle cx="200" cy="150" r="70" stroke="#ff1f5a" stroke-width="1.5" stroke-opacity="0.5" fill="none" class="dash-line"/>
  </g>

  <!-- Axis Lines -->
  <line x1="200" y1="30" x2="200" y2="70" stroke="#ff1f5a" stroke-width="1" stroke-opacity="0.4" />
  <line x1="200" y1="230" x2="200" y2="270" stroke="#ff1f5a" stroke-width="1" stroke-opacity="0.4" />
  <line x1="30" y1="150" x2="70" y2="150" stroke="#ff1f5a" stroke-width="1" stroke-opacity="0.4" />
  <line x1="330" y1="150" x2="370" y2="150" stroke="#ff1f5a" stroke-width="1" stroke-opacity="0.4" />

  <!-- Core Structure -->
  <g class="core-pulse">
    <!-- Glassmorphic Octagon -->
    <polygon points="200,90 242,108 260,150 242,192 200,210 158,192 140,150 158,108" fill="url(#glassGradient)" stroke="url(#rimGrad)" stroke-width="2" filter="url(#neonGlow)"/>
    
    <!-- Inner Octagon -->
    <polygon points="200,105 231,118 245,150 231,182 200,195 169,182 155,150 169,118" fill="#140005" stroke="#ff1f5a" stroke-width="1.5" stroke-opacity="0.7"/>
    
    <!-- Central Stop Icon (Pause Bars) -->
    <rect x="180" y="130" width="12" height="40" rx="3" fill="#ff1f5a" filter="url(#neonGlow)"/>
    <rect x="208" y="130" width="12" height="40" rx="3" fill="#ff1f5a" filter="url(#neonGlow)"/>
  </g>

</svg>
