<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes handStop {
      0%, 100% { transform: translate(200px, 150px) scale(1); }
      50% { transform: translate(200px, 150px) scale(1.05); }
    }
    @keyframes ringExpand {
      0% { r: 60; opacity: 0.6; }
      100% { r: 90; opacity: 0; }
    }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .hand { animation: handStop 2s ease-in-out infinite; }
    .ring { animation: ringExpand 2s ease-out infinite; }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="stopGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#stopGlow)" class="glow"/>
  
  <g class="hand">
    <!-- Hand/Palm -->
    <circle cx="0" cy="0" r="50" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.4"/>
    
    <!-- Fingers -->
    <rect x="-25" y="-70" width="12" height="30" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="-8" y="-75" width="12" height="35" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <rect x="9" y="-70" width="12" height="30" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    
    <!-- STOP text -->
    <text x="0" y="8" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="bold">STOP</text>
  </g>
  
  <circle cx="200" cy="150" r="60" fill="none" stroke="#ef4444" stroke-width="2" class="ring" style="animation-delay: 0s"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#ef4444" stroke-width="2" class="ring" style="animation-delay: 0.7s"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#ef4444" stroke-width="2" class="ring" style="animation-delay: 1.4s"/>
  
  <circle cx="200" cy="150" r="80" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.15" class="glow"/>
  
  <g opacity="0.4">
    <line x1="100" y1="150" x2="130" y2="150" stroke="#ef4444" stroke-width="3"/>
    <line x1="270" y1="150" x2="300" y2="150" stroke="#ef4444" stroke-width="3"/>
    <line x1="200" y1="70" x2="200" y2="100" stroke="#ef4444" stroke-width="3"/>
    <line x1="200" y1="200" x2="200" y2="230" stroke="#ef4444" stroke-width="3"/>
  </g>
</svg>
