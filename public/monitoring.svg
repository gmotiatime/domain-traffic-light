<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes eyeBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes scan {
      0% { transform: translateY(-20px); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(20px); opacity: 0; }
    }
    .glow { animation: pulse 3s ease-in-out infinite; }
    .eye { 
      transform-origin: center;
      animation: eyeBlink 4s ease-in-out infinite;
    }
    .scan-beam { animation: scan 2s ease-in-out infinite; }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#eyeGlow)" class="glow"/>
  
  <g transform="translate(200, 150)">
    <ellipse cx="0" cy="0" rx="60" ry="40" fill="none" stroke="#3b82f6" stroke-width="2.5" class="eye"/>
    <ellipse cx="0" cy="0" rx="50" ry="32" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" class="eye"/>
    
    <circle cx="0" cy="0" r="20" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#3b82f6" opacity="0.8" class="glow"/>
    <circle cx="-4" cy="-4" r="4" fill="#60a5fa" opacity="0.9"/>
    
    <rect x="-2" y="-30" width="4" height="60" rx="2" fill="#3b82f6" opacity="0.6" class="scan-beam"/>
  </g>
  
  <circle cx="200" cy="150" r="80" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15" class="glow"/>
  <circle cx="200" cy="150" r="120" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1" class="glow"/>
  
  <g opacity="0.4">
    <line x1="100" y1="150" x2="130" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="270" y1="150" x2="300" y2="150" stroke="#3b82f6" stroke-width="2"/>
    <line x1="200" y1="70" x2="200" y2="100" stroke="#3b82f6" stroke-width="2"/>
    <line x1="200" y1="200" x2="200" y2="230" stroke="#3b82f6" stroke-width="2"/>
    
    <line x1="140" y1="100" x2="160" y2="120" stroke="#3b82f6" stroke-width="2"/>
    <line x1="260" y1="100" x2="240" y2="120" stroke="#3b82f6" stroke-width="2"/>
    <line x1="140" y1="200" x2="160" y2="180" stroke="#3b82f6" stroke-width="2"/>
    <line x1="260" y1="200" x2="240" y2="180" stroke="#3b82f6" stroke-width="2"/>
  </g>
  
  <g opacity="0.5">
    <rect x="50" y="140" width="40" height="4" rx="2" fill="#3b82f6"/>
    <rect x="50" y="150" width="35" height="3" rx="1.5" fill="#3b82f6"/>
    <rect x="50" y="158" width="38" height="3" rx="1.5" fill="#3b82f6"/>
    
    <rect x="310" y="140" width="40" height="4" rx="2" fill="#3b82f6"/>
    <rect x="315" y="150" width="35" height="3" rx="1.5" fill="#3b82f6"/>
    <rect x="312" y="158" width="38" height="3" rx="1.5" fill="#3b82f6"/>
  </g>
</svg>
