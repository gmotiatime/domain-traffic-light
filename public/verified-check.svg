<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulseBlue {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes rotateDoc {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes writeLines {
      from { stroke-dashoffset: 40; }
      to { stroke-dashoffset: 0; }
    }
    .shield-pulse { animation: pulseBlue 3s ease-in-out infinite; transform-origin: 200px 150px; }
    .doc-ring { animation: rotateDoc 15s linear infinite; transform-origin: 200px 150px; }
    .doc-line { stroke-dasharray: 40; animation: writeLines 2s linear infinite alternate; }
  </style>

  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="neonBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="150" r="140" fill="url(#blueGlow)" />

  <g class="doc-ring">
    <circle cx="200" cy="150" r="105" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4" fill="none" stroke-dasharray="10 5" />
    <circle cx="200" cy="150" r="115" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.6" fill="none" stroke-dasharray="2 15" filter="url(#neonBlue)"/>
  </g>

  <!-- Side decorative nodes -->
  <circle cx="90" cy="150" r="4" fill="#60a5fa" filter="url(#neonBlue)"/>
  <circle cx="310" cy="150" r="4" fill="#60a5fa" filter="url(#neonBlue)"/>
  <line x1="90" y1="150" x2="120" y2="150" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="280" y1="150" x2="310" y2="150" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>

  <g class="shield-pulse">
    <!-- Document/Badge shape -->
    <path d="M160 80 L240 80 A10 10 0 0 1 250 90 L250 190 A10 10 0 0 1 240 200 L200 220 L160 200 A10 10 0 0 1 150 190 L150 90 A10 10 0 0 1 160 80 Z" fill="url(#glassGradient)" stroke="url(#blueGrad)" stroke-width="2" filter="url(#neonBlue)"/>
    
    <path d="M165 92 L235 92 L235 186 L200 203 L165 186 Z" fill="#000d1a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6"/>

    <!-- Text Lines inside badge -->
    <line x1="180" y1="110" x2="220" y2="110" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" class="doc-line" filter="url(#neonBlue)"/>
    <line x1="180" y1="125" x2="210" y2="125" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" class="doc-line" filter="url(#neonBlue)" style="animation-delay: 0.5s"/>
    
    <!-- Verified Ribbon/Check -->
    <circle cx="200" cy="160" r="22" fill="#1d4ed8" filter="url(#neonBlue)" stroke="#60a5fa" stroke-width="2"/>
    <path d="M190 160 L197 167 L210 152" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

</svg>
