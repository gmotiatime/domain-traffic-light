<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; filter: drop-shadow(0 0 10px #10b981); transform: scale(0.98); }
      50% { opacity: 0.8; filter: drop-shadow(0 0 25px #34d399); transform: scale(1.02); }
    }
    @keyframes checkDraw {
      0% { stroke-dashoffset: 100; opacity: 0; }
      20% { opacity: 1; stroke-dashoffset: 50; }
      40% { stroke-dashoffset: 0; }
      80% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -100; opacity: 0; }
    }
    @keyframes ringExpand {
      0% { r: 40; opacity: 0.8; stroke-width: 2.5; }
      100% { r: 80; opacity: 0; stroke-width: 0.5; }
    }
    .glow { transform-origin: center; animation: pulseGlow 4s ease-in-out infinite; }
    .check { 
      stroke-dasharray: 100; 
      stroke-dashoffset: 100;
      animation: checkDraw 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .ring { 
      transform-origin: center;
      animation: ringExpand 2.5s ease-out infinite; 
    }
  </style>
  
  <rect width="400" height="300" fill="#0a0a0a"/>
  
  <defs>
    <radialGradient id="checkGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="150" r="100" fill="url(#checkGlow)" class="glow"/>
  
  <g transform="translate(200, 150)">
    <circle cx="0" cy="0" r="50" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#10b981" stroke-width="2" opacity="0.4"/>
    
    <path d="M-20,0 L-5,20 L25,-20" 
          fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="check"/>
  </g>
  
  <circle cx="200" cy="150" r="40" fill="none" stroke="#10b981" stroke-width="2" class="ring" style="animation-delay: 0s"/>
  <circle cx="200" cy="150" r="40" fill="none" stroke="#10b981" stroke-width="2" class="ring" style="animation-delay: 0.7s"/>
  <circle cx="200" cy="150" r="40" fill="none" stroke="#10b981" stroke-width="2" class="ring" style="animation-delay: 1.4s"/>
  
  <circle cx="200" cy="150" r="70" fill="none" stroke="#10b981" stroke-width="1" opacity="0.2" class="glow"/>
  <circle cx="200" cy="150" r="90" fill="none" stroke="#10b981" stroke-width="1" opacity="0.15" class="glow"/>
  
  <g opacity="0.5">
    <circle cx="120" cy="150" r="8" fill="none" stroke="#10b981" stroke-width="2" class="glow"/>
    <path d="M115,150 L118,153 L125,145" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    
    <circle cx="280" cy="150" r="8" fill="none" stroke="#10b981" stroke-width="2" class="glow"/>
    <path d="M275,150 L278,153 L285,145" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    
    <circle cx="200" cy="70" r="8" fill="none" stroke="#10b981" stroke-width="2" class="glow"/>
    <path d="M195,70 L198,73 L205,65" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    
    <circle cx="200" cy="230" r="8" fill="none" stroke="#10b981" stroke-width="2" class="glow"/>
    <path d="M195,230 L198,233 L205,225" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
